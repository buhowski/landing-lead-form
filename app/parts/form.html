<form action="#" method="post" id="form">
    <h2>Sign up for <span>free</span> and get a gift</h2>

    <label for="name">
        <input
            type="text"
            id="name"
            name="name"
            placeholder="Your name and surname"
            required
        />
    </label>

    <label class="label-phone" for="phone">
        <input
            type="tel"
            id="phone"
            name="phone"
            placeholder="66 777 6969"
            required
        />
    </label>

    <label for="email">
        <input type="email" id="email" name="email" placeholder="Your email" required />
    </label>

    <div class="form-action">
        <button type="submit">Register for free</button>
    </div>

    <p class="form-policy">
        By clicking the button, I agree to the
        <a href="#">privacy policy</a>
    </p>
</form>
